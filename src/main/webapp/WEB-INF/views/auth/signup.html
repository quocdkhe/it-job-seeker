<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>DASHMIN - Bootstrap Admin Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="manager/img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>


</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->


        <!-- Sign Up Start -->
        <div class="container-fluid">
            <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
                <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                    <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h3>Đăng kí tài khoản</h3>
                        </div>
                        <div th:if="${param.existed}" class="alert alert-danger" role="alert">
                            Tên đăng nhập đã được sử dụng
                        </div>
                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" th:field="*{fullName}" id="floatingText"
                                    placeholder="Họ và tên">
                                <label for="floatingText">Họ và tên</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" th:field="*{username}" id="floatingText"
                                    placeholder="jhondoe">
                                <label for="floatingText">Tên đăng nhập</label>
                                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                                    style="color: red;">
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" th:field="*{email}" id="floatingInput"
                                    placeholder="name@example.com" required>
                                <label for="floatingInput">Email</label>
                                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;">
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" th:field="*{password}" id="floatingPassword"
                                    placeholder="Password">
                                <label for="floatingPassword">Mật khẩu</label>
                                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                                    style="color: red;">
                                </div>
                            </div>
                            <div class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}"></div>

                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <a href="/forget-pass">Quên mật khẩu</a>
                            </div>
                            <button type="submit" class="btn btn-primary py-3 w-100 mb-4">Đăng kí</button>
                        </form>

                        <p class="text-center mb-0">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Sign Up End -->
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Template Javascript -->

    <script src="/manager/js/main.js"></script>
</body>

</html>
