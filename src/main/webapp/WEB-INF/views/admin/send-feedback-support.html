<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Admin-Manage Account</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">
    <!-- Toastr library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
        <!-- Spinner End -->


        <!-- Sidebar Start -->
        <div th:replace="~{layout/sidebar-admin :: sidebar-admin}"></div>
        <!-- Sidebar End -->


        <!-- Content Start -->
        <div class="content">
            <!-- Navbar Start -->
            <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
            <!-- Navbar End -->

            <div class="container-fluid pt-4 px-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="/admin/feedback">Phản hồi</a></li>
                        <li class="breadcrumb-item"><a href="/admin/feedback-support">Yêu cầu hỗ trợ</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Gửi Phản Hồi</li>
                    </ol>
                </nav>

                <div class="bg-light rounded h-100 p-4">
                    <h3 class="text-primary text-center mb-4">📩 Gửi Phản Hồi</h3>
                    <form th:action="@{/admin/feedback/send}" method="post" enctype="multipart/form-data"
                        th:object="${support}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email của bạn</label>
                            <input name="email" type="email" class="form-control" id="email" th:field="*{email}">
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề</label>
                            <input name="topic" type="text" class="form-control" id="title" th:field="*{topic}"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="content" class="form-label">Nội dung</label>
                            <textarea name="content" class="form-control" id="content" rows="4" required></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <!-- Hình ảnh minh họa 1 -->
                            <div class="col-md-6 text-center">
                                <label class="fw-bold mb-2">Hình ảnh minh họa 1</label>
                                <div class="card p-2" style="background-color: #dddddd;">
                                    <input name="imageFile1" type="file" class="form-control" id="imageFile1"
                                        accept=".png, .jpg, .jpeg, .webp" style="display: none;" />
                                    <img class="img-fluid rounded" style="max-height: 300; cursor: pointer;"
                                        alt="Click để chọn ảnh minh họa 1" id="imagePreview1"
                                        onclick="document.getElementById('imageFile1').click();" />
                                </div>
                            </div>

                            <!-- Hình ảnh minh họa 2 -->
                            <div class="col-md-6 text-center">
                                <label class="fw-bold mb-2">Hình ảnh minh họa 2</label>
                                <div class="card p-2" style="background-color: #dddddd;">
                                    <input name="imageFile2" type="file" class="form-control" id="imageFile2"
                                        accept=".png, .jpg, .jpeg, .webp" style="display: none;" />
                                    <img class="img-fluid rounded" style="max-height: 300; cursor: pointer;"
                                        alt="Click để chọn ảnh minh họa 2" id="imagePreview2"
                                        onclick="document.getElementById('imageFile2').click();" />
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary w-100">Gửi Phản Hồi</button>

                        </div>
                    </form>
                </div>
            </div>


            <!-- Kết thúc phần chính -->


            <!-- Footer Start -->
            <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
            <!-- Footer End -->
        </div>
        <!-- Content End -->


        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
        integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Template Javascript -->
    <script src="/manager/js/main.js"></script>
</body>

</html>
