<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Admin-Manage Account</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .review-form,
        .review-guide {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            color: black;
        }

        .form-title {
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Định dạng các icon sao */
        .star-rating i {
            font-size: 1.5rem;
            color: #ccc;
            /* Màu mặc định cho sao */
            cursor: pointer;
            margin-right: 5px;
            transition: color 0.2s;
        }

        .star-rating i.hovered {
            color: #ffc107;
            /* Màu vàng khi hover hoặc chọn */
        }

        .review-guide {
            position: sticky;
            top: 48px;
            /* hoặc top: 0; tuỳ ý muốn canh lề trên */
        }
    </style>
</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
        <!-- Spinner End -->


        <!-- Sidebar Start -->
        <div th:replace="~{layout/sidebar-admin :: sidebar-admin}"></div>
        <!-- Sidebar End -->


        <!-- Content Start -->
        <div class="content">
            <!-- Navbar Start -->
            <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
            <!-- Navbar End -->


            <!-- Mở đầu phần chính -->
            <div class="container-fluid pt-4 px-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/review-report}">Báo cáo đánh giá</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Chi tiết đánh giá</li>
                    </ol>
                </nav>
                <!-- Viết code vào đây -->
                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Chi tiết đánh giá</h6>
                    <div class="review-form">
                        <h2 class="form-title">Đánh giá <span th:text="${company.name}"></span></h2>
                        <p>
                            Chỉ mất 1 phút để hoàn thành mẫu đánh giá này.
                            Ý kiến của bạn sẽ giúp các ứng viên khác hiểu rõ hơn về công ty.
                        </p>

                        <!-- Form -->
                        <form th:object="${review}">
                            <!-- 1. Overall rating -->
                            <div class="d-md-flex justify-content-md-between mb-3">
                                <div class="col-md-4">
                                    <label for="overallRating" class="form-label">
                                        Đánh giá tổng quan <span class="text-danger">*</span>
                                    </label>
                                </div>
                                <div class="star-rating d-inline-block col-md-8" id="overallRating">
                                    <!-- Sửa prefix thành 'fa-solid' để chắc chắn hiển thị trong Font Awesome 6 -->
                                    <i class="fas fa-star" data-value="1"></i>
                                    <i class="fas fa-star" data-value="2"></i>
                                    <i class="fas fa-star" data-value="3"></i>
                                    <i class="fas fa-star" data-value="4"></i>
                                    <i class="fas fa-star" data-value="5"></i>
                                </div>
                                <input type="hidden" name="overallRating" id="overallRatingInput"
                                    th:field="*{overallRating}" readonly />
                            </div>

                            <!-- 2. Summary -->
                            <div class="mb-4">
                                <label for="summary" class="form-label">
                                    Tóm tắt <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="summary" name="summary" th:field="*{header}"
                                    readonly />
                            </div>

                            <!-- 3. Overtime policy -->
                            <div class="mb-4">
                                <label class="form-label" style="font-weight: bold; font-size: 18px;">
                                    Bạn cảm thấy thế nào về chính sách làm thêm của công ty? <span
                                        class="text-danger">*</span>
                                </label>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{overtimePolicy}"
                                        id="overtimeSatisfied" value="Satisfied" />
                                    <label class="form-check-label" for="overtimeSatisfied">
                                        Hài lòng
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{overtimePolicy}"
                                        id="overtimeNeutral" value="Neutral" />
                                    <label class="form-check-label" for="overtimeNeutral">
                                        Bình thường
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{overtimePolicy}"
                                        id="overtimeUnsatisfied" value="Unsatisfied" />
                                    <label class="form-check-label" for="overtimeUnsatisfied">
                                        Không hài lòng
                                    </label>
                                </div>
                            </div>


                            <!-- 4. Reason for your choice -->
                            <div class="mb-4">
                                <label for="overtimeReason" class="form-label">
                                    Hãy nêu lí do
                                </label>
                                <textarea class="form-control" id="overtimeReason" name="overtimeReason" rows="3"
                                    th:field="*{overtimeReason}"
                                    placeholder="Giải thích tại sao bạn cảm thấy như vậy..." readonly></textarea>
                            </div>

                            <!-- 5. What makes you love working here? -->
                            <div class="mb-4">
                                <label for="loveWorking" class="form-label" style="font-weight: bold; font-size: 18px;">
                                    Điều gì khiến bạn thích làm việc ở đây? <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="loveWorking" name="loveWorking" rows="3"
                                    th:field="*{workingReason}"
                                    placeholder="ví dụ: đồng nghiệp tốt, các dự án thú vị..." readonly></textarea>
                            </div>

                            <!-- 6. Suggestion for improvement -->
                            <div class="mb-4">
                                <label for="improvement" class="form-label" style="font-weight: bold; font-size: 18px;">
                                    Đề xuất cải thiện <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="improvement" name="improvement" rows="3"
                                    th:field="*{improvement}" placeholder="Những gì cần cải thiện?" readonly></textarea>
                            </div>

                            <!-- 7. Rating detail (5 mục) -->
                            <h5 class="mb-3" style="font-weight: bold; font-size: 18px;">Đánh giá chi tiết <span
                                    class="text-danger">*</span></h5>
                            <div class="d-flex flex-column">
                                <!-- Salary & Benefits -->
                                <div class="d-md-flex justify-content-md-between mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Thu nhập</label>
                                    </div>
                                    <div class="star-rating d-inline-block col-12 col-md-8" id="ratingSalary">
                                        <i class="fas fa-star" data-value="1"></i>
                                        <i class="fas fa-star" data-value="2"></i>
                                        <i class="fas fa-star" data-value="3"></i>
                                        <i class="fas fa-star" data-value="4"></i>
                                        <i class="fas fa-star" data-value="5"></i>
                                    </div>
                                    <input type="hidden" name="ratingSalary" id="ratingSalaryInput"
                                        th:field="*{salaryRating}" />
                                </div>
                                <!-- Manager -->
                                <div class="d-md-flex justify-content-md-between mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Cấp trên</label>
                                    </div>
                                    <div class="star-rating d-inline-block col-12 col-md-8" id="ratingManager">
                                        <i class="fas fa-star" data-value="1"></i>
                                        <i class="fas fa-star" data-value="2"></i>
                                        <i class="fas fa-star" data-value="3"></i>
                                        <i class="fas fa-star" data-value="4"></i>
                                        <i class="fas fa-star" data-value="5"></i>
                                    </div>
                                    <input type="hidden" name="ratingManager" id="ratingManagerInput"
                                        th:field="*{managerRating}" />
                                </div>
                                <!-- Teamwork -->
                                <div class="d-md-flex justify-content-md-between mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Khả năng làm việc nhóm</label>
                                    </div>
                                    <div class="star-rating d-inline-block col-12 col-md-8" id="ratingTeamwork">
                                        <i class="fas fa-star" data-value="1"></i>
                                        <i class="fas fa-star" data-value="2"></i>
                                        <i class="fas fa-star" data-value="3"></i>
                                        <i class="fas fa-star" data-value="4"></i>
                                        <i class="fas fa-star" data-value="5"></i>
                                    </div>
                                    <input type="hidden" name="ratingTeamwork" id="ratingTeamworkInput"
                                        th:field="*{teamworkRating}" />
                                </div>
                                <!-- Culture -->
                                <div class="d-md-flex justify-content-md-between mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Văn hóa công ty</label>
                                    </div>
                                    <div class="star-rating d-inline-block col-12 col-md-8" id="ratingCulture">
                                        <i class="fas fa-star" data-value="1"></i>
                                        <i class="fas fa-star" data-value="2"></i>
                                        <i class="fas fa-star" data-value="3"></i>
                                        <i class="fas fa-star" data-value="4"></i>
                                        <i class="fas fa-star" data-value="5"></i>
                                    </div>
                                    <input type="hidden" name="ratingCulture" id="ratingCultureInput"
                                        th:field="*{cultureRating}" />
                                </div>
                                <!-- Office & Work Environment -->
                                <div class="d-md-flex justify-content-md-between mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Môi trường làm việc</label>
                                    </div>
                                    <div class="star-rating d-inline-block col-12 col-md-8" id="ratingOffice">
                                        <i class="fas fa-star" data-value="1"></i>
                                        <i class="fas fa-star" data-value="2"></i>
                                        <i class="fas fa-star" data-value="3"></i>
                                        <i class="fas fa-star" data-value="4"></i>
                                        <i class="fas fa-star" data-value="5"></i>
                                    </div>
                                    <input type="hidden" name="ratingOffice" id="ratingOfficeInput"
                                        th:field="*{environmentRating}" />
                                </div>
                            </div>

                            <!-- 8. Recommend to friends? -->
                            <div class="mb-4">
                                <label class="form-label">
                                    Bạn có muốn giới thiệu công ty này cho bạn bè không? <span
                                        class="text-danger">*</span>
                                </label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="recommend"
                                        th:field="*{isRecommended}" id="recommendYes" value="true" readonly />
                                    <label class="form-check-label" for="recommendYes">
                                        Có
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="recommend"
                                        th:field="*{isRecommended}" id="recommendNo" value="false" />
                                    <label class="form-check-label" for="recommendNo">
                                        Không
                                    </label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end">
                                <a th:href="@{/admin/review-report/delete-review-report/{id}(id=${review.id})}"
                                    class="btn btn-sm btn-danger" style="padding: 10px 20px;">Xóa</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Kết thúc phần chính -->


            <!-- Footer Start -->
            <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
            <!-- Footer End -->
        </div>
        <!-- Content End -->


        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
        integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Template Javascript -->
    <script src="/manager/js/main.js"></script>
    <!-- Script JS cho hiệu ứng ngôi sao -->
    <script>
        function initStarRating(starContainerId, hiddenInputId) {
            const container = document.getElementById(starContainerId);
            const stars = container.querySelectorAll('i.fa-star');
            const hiddenInput = document.getElementById(hiddenInputId);

            if (!container || !hiddenInput) return;

            // Lấy giá trị rating từ input ẩn và hiển thị ngay khi trang load
            const currentValue = hiddenInput.value;
            if (currentValue) {
                highlightStars(stars, currentValue);
            }
        }

        // Hàm highlightStars: highlight các sao <= value
        function highlightStars(stars, value) {
            stars.forEach((s) => {
                const starValue = s.getAttribute('data-value');
                if (Number(starValue) <= Number(value)) {
                    s.classList.add('hovered');
                } else {
                    s.classList.remove('hovered');
                }
            });
        }

        // Khởi tạo rating khi trang load
        document.addEventListener('DOMContentLoaded', () => {
            initStarRating('overallRating', 'overallRatingInput');
            initStarRating('ratingSalary', 'ratingSalaryInput');
            initStarRating('ratingManager', 'ratingManagerInput');
            initStarRating('ratingTeamwork', 'ratingTeamworkInput');
            initStarRating('ratingCulture', 'ratingCultureInput');
            initStarRating('ratingOffice', 'ratingOfficeInput');
        });
    </script>
</body>

</html>
