<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Admin - Add Company</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">
    <!-- Toastr library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Select2 CSS-->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
        <!-- Spinner End -->

        <!-- Sidebar Start -->
        <div th:replace="~{layout/sidebar-admin :: sidebar-admin}"></div>
        <!-- Sidebar End -->

        <!-- Content Start -->
        <div class="content">
            <!-- Navbar Start -->
            <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
            <!-- Navbar End -->

            <!-- Main Content Start -->
            <div class="container-fluid pt-4 px-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="/admin/manage-company">Công ty</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Thêm công ty</li>
                    </ol>
                </nav>

                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Sửa Công Ty</h6>
                    <form th:action="@{/admin/manage-company/edit-company}" method="post" enctype="multipart/form-data"
                        th:object="${company}">
                        <input type="hidden" th:field="*{id}" />
                        <div class="row">
                            <div class="col-md-4 text-center">
                                <div class="row g-3">
                                    <!-- Input chọn file (ẩn đi) -->
                                    <div class="col-12">
                                        <input class="form-control" type="file" id="imageFile" name="imageFile"
                                            accept=".png, .jpg, .jpeg, .webp" style="display: none;" />
                                    </div>

                                    <!-- Hiển thị ảnh hiện tại (click để chọn file) -->
                                    <div class="col-12">
                                        <img style="max-height: 250px; max-width: 100%; cursor: pointer; border-radius: 30px; border: transparent solid;"
                                            alt="Click để chọn ảnh đại diện" id="imagePreview" th:src="${company.logo}"
                                            onclick="document.getElementById('imageFile').click();" />
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="row">
                                    <!-- Tên công ty -->
                                    <div class="mb-3 col-md-6">
                                        <label for="companyName" class="form-label">Tên công ty<span
                                                style="color: red;">*</span></label>
                                        <input type="text" class="form-control" id="companyName" th:field="*{name}"
                                            placeholder="Nhập tên công ty" required>
                                    </div>

                                    <!-- Loại hình công ty (Dropdown) -->
                                    <div class="mb-3 col-md-6">
                                        <label for="companyType" class="form-label">Loại hình công ty</label>
                                        <select class="form-select" id="companyType" th:field="*{type}">
                                            <option value="" disabled selected>Chọn loại hình</option>
                                            <option value="IT Outsourcing">IT Outsourcing</option>
                                            <option value="IT Product">IT Product</option>
                                            <option value="IT Service and IT Consulting">IT Service and IT Consulting
                                            </option>
                                        </select>
                                    </div>

                                    <!-- Lĩnh vực  -->
                                    <div class="mb-3 col-md-6">
                                        <label for="companyIndustry" class="form-label">Lĩnh vực</label>
                                        <input type="text" class="form-control" id="companyIndustry"
                                            th:field="*{industry}" placeholder="Nhập lĩnh vực">
                                    </div>

                                    <!-- Quốc gia -->
                                    <div class="mb-3 col-md-6">
                                        <label for="companyCountry" class="form-label">Quốc gia</label>
                                        <input type="text" class="form-control" id="companyCountry"
                                            th:field="*{country}" placeholder="Nhập quốc gia">
                                    </div>

                                    <div class="mb-3 col-12">
                                        <label for="otPolicy" class="form-label">Làm việc ngoài giờ</label>
                                        <select class="form-select" id="otPolicy" th:field="*{otPolicy}">
                                            <option value="" disabled selected>Chọn loại hình</option>
                                            <option value="Thêm lương OT">Thêm lương OT</option>
                                            <option value="Không OT">Không OT</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <!-- Kỹ năng -->
                            <div class="mb-3 col-md-12">
                                <label for="skills" class="form-label">Kỹ năng</label>
                                <select id="skills" name="skills" class="form-select" multiple="multiple"
                                    th:field="*{skills}">
                                    <option th:each="skill : ${skills}" th:value="${skill.id}" th:text="${skill.name}">
                                    </option>
                                </select>
                            </div>

                            <!-- Mô tả -->
                            <div class="mb-3 col-md-12">
                                <label for="description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" rows="3"
                                    placeholder="Nhập mô tả công ty" th:field="*{description}"></textarea>
                            </div>

                            <!-- Quy mô -->
                            <div class="mb-3 col-md-6">
                                <label for="companySize" class="form-label">Quy mô</label>
                                <input type="text" class="form-control" id="companySize" th:field="*{size}"
                                    placeholder="Nhập quy mô">
                            </div>

                            <!-- Địa chỉ website -->
                            <div class="mb-3 col-md-6">
                                <label for="companyWebsite" class="form-label">Website</label>
                                <input type="url" class="form-control" id="companyWebsite" th:field="*{website}"
                                    placeholder="Nhập website công ty">
                            </div>
                        </div>
                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
            <!-- Main Content End -->

            <!-- Footer Start -->
            <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
            <!-- Footer End -->
        </div>
        <!-- Content End -->

        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/manager/lib/tinymce/js/tinymce/tinymce.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
        integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="/manager/js/main.js"></script>
</body>

</html>
