<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Admin-Add user</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
        <!-- Spinner End -->


        <!-- Sidebar Start -->
        <div th:replace="~{layout/sidebar-admin :: sidebar-admin}"></div>
        <!-- Sidebar End -->


        <!-- Content Start -->
        <div class="content">
            <!-- Navbar Start -->
            <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
            <!-- Navbar End -->


            <!-- Mở đầu phần chính -->
            <div class="container-fluid pt-4 px-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/account}">Tài khoản</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Chi tiết</li>
                    </ol>
                </nav>
                <!-- Viết code vào đây -->
                <div class="bg-light rounded h-100 p-4">
                    <h6 class="mb-4">Chi tiết thông tin người dùng</h6>
                    <div class="row">
                        <div class="col-md-3 d-flex justify-content-center align-items-center">
                            <img th:if="${user.provider == 'LOCAL'}" th:src="'/avatar/' + @{${user.avatar}}"
                                alt="User Avatar" class="image-fluid" style="width: 100%;">
                            <img th:if="${user.provider != 'LOCAL'}" th:src="${user.avatar}" alt="User Avatar"
                                class="image-fluid" style="width: 100%;">
                        </div>
                        <div class="col-md-9">
                            <table class="table table-bordered">
                                <tbody>
                                    <tr>
                                        <th scope="row">Địa chỉ Email</th>
                                        <td th:text="${user.email}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Họ và tên</th>
                                        <td th:text="${user.fullName}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Tên đăng nhập</th>
                                        <td th:text="${user.username}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Ngày sinh</th>
                                        <td th:text="${user.birthDate}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Số điện thoại</th>
                                        <td th:text="${user.phone}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Công ty</th>
                                        <td th:text="${user.workingCompany!= null ? user.workingCompany.name : ''}">
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Địa chỉ thường trú</th>
                                        <td th:text="${user.address}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Vai trò</th>
                                        <td th:text="${user.role.name}"></td>
                                    </tr>
                                    <tr>
                                        <th scope="row">Giới tính</th>
                                        <td th:text="${user.gender == true ? 'Nam' : 'Nữ'}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Kết thúc phần chính -->


            <!-- Footer Start -->
            <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
            <!-- Footer End -->
        </div>
        <!-- Content End -->


        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Template Javascript -->
    <script src="/manager/js/main.js"></script>
</body>

</html>
