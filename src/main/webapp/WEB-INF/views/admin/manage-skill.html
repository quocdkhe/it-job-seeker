<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Skill management</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <!-- Favicon -->
  <link href="img/favicon.ico" rel="icon">

  <!-- Google Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Font Stylesheet -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Libraries Stylesheet -->
  <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

  <!-- Customized Bootstrap Stylesheet -->
  <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

  <!-- Template Stylesheet -->
  <link href="/manager/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
    integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="container-fluid position-relative bg-white d-flex p-0">
    <!-- Spinner Start -->
    <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
    <!-- Spinner End -->


    <!-- Sidebar Start -->
    <div th:replace="~{layout/sidebar-admin :: sidebar-admin}"></div>
    <!-- Sidebar End -->


    <!-- Content Start -->
    <div class="content">
      <!-- Navbar Start -->
      <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
      <!-- Navbar End -->


      <!-- Mở đầu phần chính -->
      <div class="container-fluid pt-4 px-4">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Quản lý kĩ năng</li>
          </ol>
        </nav>
        <!-- Viết code vào đây -->
        <div class="bg-light rounded h-100 p-4">
          <h6 class="mb-4">Quản lý kĩ năng</h6>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th scope="col">STT</th>
                  <th scope="col">Mã số</th>
                  <th scope="col">Tên</th>
                  <th scope="col">Chỉnh sửa</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="skill, stat : ${skills}">
                  <td th:text="${(currentPage - 1) * 10 + stat.index + 1}"></td> <!-- Ordinal number -->
                  <td th:text="${skill.id}"></td>
                  <td th:text="${skill.name}"></td>
                  <td>
                    <a th:href="@{/admin/delete-skill/{id}(id=${skill.id})}" class="btn btn-sm btn-danger">Xoá</a>
                    <button type="button" class="btn btn-sm btn-primary skillInfo"
                      th:attr="data-id=${skill.id},data-name=${skill.name}">
                      Chỉnh sửa
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <!-- Pagination -->
            <nav>
              <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/admin/manage-skill(page=${currentPage-1})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                  </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                  th:classappend="${currentPage == i} ? 'active'">
                  <a class="page-link" th:href="@{/admin/manage-skill(page=${i})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                  <a class="page-link" th:href="@{/admin/manage-skill(page=${currentPage+1})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                  </a>
                </li>
              </ul>
            </nav>
            <!-- End Pagination -->
            <!-- <div colspan="6">
              <a th:href="@{/admin/manage-skill}" class="btn btn-sm btn-success">Thêm kĩ năng mới</a>
            </div> -->
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addSkillModal">
              Thêm kĩ năng
            </button>

          </div>
        </div>
      </div>
      <!-- Kết thúc phần chính -->

      <div class="modal fade" id="addSkillModal" tabindex="-1" aria-labelledby="addSkillModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="addSkillModelLabel">Thêm kĩ năng</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form th:action="@{/admin/add-skill}" id="addSkillModal" method="post">
                <div class="mb-3">
                  <label for="skillName" class="form-label">Tên kĩ năng</label>
                  <input type="text" name="skillName" class="form-control" id="skillName" required>
                </div>
                <button type="submit" class="btn btn-sm btn-success">Thêm kĩ năng</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="editSkillModal" tabindex="-1" aria-labelledby="editSkillModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="editSkillModalLabel">Chỉnh sửa</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form th:action="@{/admin/edit-skill}" id="editSkillModal" method="post">
                <div class="mb-3">
                  <label for="skillName" class="form-label">Tên kĩ năng</label>
                  <input type="text" name="skillName" class="form-control" id="edit-skill-name" required>
                  <input type="hidden" id="edit-skill-id" name="skillId">
                </div>
                <button type="submit" class="btn btn-sm btn-primary">Chỉnh sửa kĩ năng</button>
              </form>
            </div>
          </div>
        </div>
      </div>


      <!-- Footer Start -->
      <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
      <!-- Footer End -->
    </div>
    <!-- Content End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
  </div>

  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
    integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Template Javascript -->
  <script src="/manager/js/main.js"></script>
  <script>
    // Select all buttons with the class 'skillInfo'
    const skillInfoButtons = document.querySelectorAll('.skillInfo');

    // Add click event listener to each button
    skillInfoButtons.forEach(button => {
      button.addEventListener('click', (event) => {
        // Get the data attributes
        const skillId = button.getAttribute('data-id');
        const skillName = button.getAttribute('data-name');

        // Log the values (you can replace this with your desired functionality)
        console.log('Skill ID:', skillId);
        console.log('Skill Name:', skillName);
        // Set the skill name and ID in the modal's inputs
        document.getElementById("edit-skill-name").value = skillName; // Visible input
        document.getElementById("edit-skill-id").value = skillId; // Hidden input
        // Show the modal
        const editSkillModal = new bootstrap.Modal(document.getElementById("editSkillModal"));
        editSkillModal.show();
      });
    });

  </script>

</body>

</html>
