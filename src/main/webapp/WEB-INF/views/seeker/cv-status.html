<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>CV status</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta sec:authorize="isAuthenticated()" name="_csrf" th:content="${_csrf.token}" />
    <meta sec:authorize="isAuthenticated()" name="_csrf_header" th:content="${_csrf.headerName}" />


    <!-- Favicon -->
    <link href="/user/img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet" />


    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/user/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/user/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/user/css/style.css" rel="stylesheet">
    <!-- Toastr library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Lightbox stylesheet -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css">
</head>

<body>
    <div class="container-xxl bg-white p-0">
        <!-- Spinner Start -->
        <!-- <div id="spinner"
      class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
        <span class="sr-only">Loading...</span>
      </div>
    </div> -->
        <!-- Spinner End -->


        <!-- Navbar Start -->
        <div th:replace="~{layout/navbar-seeker :: navbar}"></div>
        <!-- Navbar End -->


        <!-- Breadcrum start -->
        <div class="container-xxl py-5 bg-dark page-header">
            <div class="container my-5 pt-5 pb-4">
                <h1 class="display-3 text-white mb-3 animated slideInDown">Trạng thái CV</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb text-uppercase">
                        <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                        <li class="breadcrumb-item text-white active" aria-current="page">Trạng thái CV</li>
                    </ol>
                </nav>
            </div>
        </div>
        <!-- Breadcrum end -->


        <div class="container-xxl py-5">
            <div class="container">
                <h1 class="text-center mb-5 wow fadeInUp" data-wow-delay="0.1s">Danh sách đã ứng tuyển</h1>
                <div class="tab-class text-center wow fadeInUp" data-wow-delay="0.3s">
                    <div class="tab-content">
                        <div class="tab-pane fade show p-0 active">
                            <div th:each="resume : ${resumeList}">
                                <div class="job-item p-4 mb-4">
                                    <div class="row g-4">
                                        <div class="col-sm-12 col-md-8 d-flex align-items-center">
                                            <div class="image-container col-4">
                                                <img th:src="${resume.company.logo}" alt="Company logo" />
                                            </div>
                                            <div class=" col-9 text-start ps-4">

                                                <div class="col-12 d-flex align-items-center">
                                                    <h5 class="mb-0 me-2" th:text="${resume.job.title}"></h5>
                                                    <a th:href="@{/jobs/{id}(id=${resume.job.id})}" target="_blank">
                                                        <i class="fa fa-external-link-alt text-primary"></i>
                                                    </a>
                                                </div>
                                                <div class="col-12 d-flex align-items-center">
                                                    <h2 class="text-truncate me-2 mb-0"
                                                        th:text="${resume.company.name}"></h2>
                                                    <a th:href="@{/companies/{id}(id=${resume.company.id})}"
                                                        target="_blank">
                                                        <i class="fa fa-external-link-alt text-primary"></i>
                                                    </a>
                                                </div>

                                                <p class="text-truncate me-0">
                                                    Trạng thái: <span th:text="${resume.status}"></span>
                                                </p>
                                                <p class="text-truncate me-0">
                                                    Vị trí ứng tuyển: <span th:text="${resume.preferredLevel}"></span>
                                                </p>
                                                <p class="text-truncate">Thời gian ứng tuyển: <span
                                                        th:text="${resume.updatedAt}"></span>
                                                </p>
                                                <p>
                                                    CV đã ứng tuyển: <span th:text="${resume.resume }"></span>
                                                </p>

                                            </div>
                                        </div>

                                        <div
                                            class="col-sm-12 col-md-4 d-flex flex-column align-items-start align-items-md-end justify-content-center">
                                            <div class="d-flex flex-column pb-5">
                                                <b class=" text-success " th:text="${resume.job.salary}"></b>
                                                <p class="mt-5"></p>

                                            </div>
                                            <a class="mt-5"
                                                th:href="@{/cv/{name}/{cvFile}(name=${user.username},cvFile=${resume.resume})}"
                                                target="_blank">
                                                <button class="btn btn-success btn-lg rounded-pill">
                                                    <i class="fa fa-eye"></i>
                                                    <b>Xem CV</b>
                                                </button>
                                            </a>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav aria-label="Pagination navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/cv-status(page=${currentPage-1})}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/cv-status(page=${i})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/cv-statusstatus(page=${currentPage+1})}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
        <!-- End Pagination -->


        <!-- Footer Start -->
        <div th:replace="~{layout/footer-seeker :: footer}"></div>
        <!-- Footer End -->


        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>

        <!-- JavaScript Libraries -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
            integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="/user/js/main.js"></script>

</body>

</html>
