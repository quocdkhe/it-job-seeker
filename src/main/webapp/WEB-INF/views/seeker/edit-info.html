<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>JobEntry - Job Portal Website Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">


    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet" />


    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/user/lib/animate/animate.min.css" rel="stylesheet">
    <link href="/user/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/user/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/user/css/style.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Toastr library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body>
    <div class="container-xxl bg-white p-0">
        <!-- Spinner Start -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->


        <!-- Navbar Start -->
        <div th:replace="~{layout/navbar-seeker :: navbar}"></div>
        <!-- Navbar End -->


        <!-- Header End -->
        <div class="container-xxl py-5 bg-dark page-header mb-5">
            <div class="container my-5 pt-5 pb-4">
                <h1 class="display-3 text-white mb-3 animated slideInDown">Thông tin cá nhân</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb text-uppercase">
                        <li class="breadcrumb-item"><a href="#">Trang chủ</a></li>
                        <li class="breadcrumb-item text-white active" aria-current="page">Thông tin cá nhân</li>
                    </ol>
                </nav>
            </div>
        </div>
        <!-- Header End -->


        <!-- Delete Account Modal -->
        <div class="modal fade" id="deleteAccountModal" tabindex="-1" aria-labelledby="deleteAccountModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteAccountModalLabel">Xóa Tài Khoản</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Bạn có chắc chắn muốn xóa tài khoản của mình không? Hành động này không thể hoàn tác.
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <form th:action="@{/seeker/delete-account}" method="post">
                            <input type="hidden" name="userId" th:value="${session.userId}">
                            <button type="submit" class="btn btn-danger">Xóa</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="container-xxl py-5">
            <div class="container">
                <div class="row">
                    <!-- Cột bên trái: Ảnh đại diện -->
                    <div class="col-md-4 text-center">
                        <form th:if="${session.provider == 'LOCAL'}" id="avatarForm"
                            th:action="@{/seeker/update-avatar}" method="post" enctype="multipart/form-data">
                            <div class="row g-3">
                                <!-- Input chọn file (ẩn đi) -->
                                <div class="col-12">
                                    <input class="form-control" type="file" id="avatarFile" name="imageFile"
                                        accept=".png, .jpg, .jpeg, .webp" style="display: none;"
                                        onchange="document.getElementById('avatarForm').submit();" />
                                </div>
                                <!-- Hiển thị ảnh hiện tại (click để chọn file) -->
                                <div class="col-12">
                                    <img th:if="${session.provider == 'LOCAL'}"
                                        style="max-height: 250px; max-width: 100%; cursor: pointer; border-radius: 30px; border:  transparent  solid;"
                                        alt="avatar preview" id="avatarPreview"
                                        th:src="${session.avatar != null ? '/avatar/' + session.avatar : '/avatar/avatar-trang-4.jpg'}"
                                        onclick="document.getElementById('avatarFile').click();" />

                                    <p th:if="${session.avatar == null}"
                                        style="margin-top: 10px; font-size: 14px; color: #555;">Click vào đây để chọn
                                        ảnh đại diện</p>
                                </div>
                            </div>
                        </form>

                        <div th:if="${session.provider != 'LOCAL'}" class="col-12">
                            <img style="max-height: 250px; max-width: 100%; border-radius: 30px; border:  transparent  solid;"
                                alt="avatar preview" id="avatarPreview"
                                th:src="${session.avatar != null ? session.avatar : '/avatar/avatar-trang-4.jpg'}" />

                        </div>
                    </div>

                    <!-- Cột bên phải: Thông tin sửa đổi -->
                    <div class="col-md-8">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="mb-4" style="font-family: 'Inter', sans-serif; font-weight: 800; color: #333;">
                                Thông tin cá nhân
                            </h2>
                            <!-- Nút Đổi mật khẩu và Xóa tài khoản -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                                    data-bs-target="#changePasswordModal">
                                    Đổi Mật Khẩu
                                </button>
                            </div>
                        </div>

                        <form th:action="@{/seeker/edit-info}" method="post" th:object="${user}">
                            <div class="row g-3">
                                <input type="number" class="form-control" id="id" th:field="*{id}" hidden>

                                <!-- Họ tên -->
                                <div class="col-12 col-sm-6">
                                    <label for="fullName" class="form-label">Họ tên:</label>
                                    <input type="text" class="form-control" id="fullName" placeholder="Nhập họ tên"
                                        th:field="*{fullName}" required>
                                </div>

                                <!-- Email -->
                                <div class="col-12 col-sm-6">
                                    <label for="email" class="form-label">Email:</label>
                                    <input type="email" class="form-control" id="email" placeholder="Nhập email"
                                        th:field="*{email}" required>
                                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;">
                                    </div>
                                </div>

                                <!-- Số điện thoại -->
                                <div class="col-12 col-sm-6">
                                    <label for="phone" class="form-label">Số điện thoại:</label>
                                    <input type="tel" class="form-control" id="phone" placeholder="Nhập số điện thoại"
                                        th:field="*{phone}" required>
                                    <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: red;">
                                    </div>
                                </div>

                                <!-- Địa chỉ -->
                                <div class="col-12 col-sm-6">
                                    <label for="address" class="form-label">Địa chỉ thường trú:</label>
                                    <input type="text" class="form-control" id="address" placeholder="Nhập địa chỉ"
                                        th:field="*{address}" required>
                                </div>

                                <!-- Ngày sinh -->
                                <div class="col-12 col-sm-6">
                                    <label for="exampleInputBirthDate" class="form-label">Ngày sinh:</label>
                                    <input type="date" class="form-control" id="exampleInputBirthDate"
                                        th:field="*{birthDate}" required>
                                    <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"
                                        style="color: red;">
                                    </div>
                                </div>

                                <!-- Giới tính -->
                                <div class="col-12 col-sm-6 d-flex flex-column">
                                    <label for="gender" class="form-label">Giới tính:</label>
                                    <div class="d-flex ">
                                        <div>
                                            <input type="radio" id="male" name="gender" value="true"
                                                th:field="*{gender}">
                                            <label for="male">Nam</label>
                                        </div>

                                        <div class="ms-2">
                                            <input type="radio" id="female" name="gender" value="false"
                                                th:field="*{gender}">
                                            <label for="female">Nữ</label>
                                        </div>

                                    </div>

                                </div>
                            </div>

                            <!-- Nút Submit -->
                            <div class="col-12 d-flex justify-content-center">
                                <button th:if="${session.provider == 'LOCAL'}"
                                    style="border-radius: 15px; border: 1px solid; padding: 10px 25px;"
                                    class="btn btn-primary mt-3" type="submit">Cập nhật</button>
                            </div>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Để form vào đây -->

    <!-- Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="changePasswordModalLabel">Đổi Mật Khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="changePasswordForm" th:action="@{/seeker/update-pwd}" th:object="${user}" method="post">
                        <input type="number" class="form-control" id="id" th:field="*{id}" hidden>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mật khẩu cũ</label>
                            <input type="password" name="oldPassword" class="form-control" id="oldPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" id="newPassword" th:field="*{password}"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" name="confirmPassword" class="form-control" id="confirmPassword"
                                required>
                            <div id="confirmPasswordError" class="form-text text-danger"></div>
                            <!-- Hiển thị lỗi -->
                        </div>
                        <div class="d-flex justify-content-between">
                            <div>
                                <button type="submit" class="btn btn-primary">Đổi Mật Khẩu</button>
                                <a href="/forget-pass" class="btn btn-link">Quên Mật Khẩu</a>
                            </div>
                            <button type="reset" class="btn btn-secondary">Xóa hết</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>






    <!-- Footer Start -->
    <div th:replace="~{layout/footer-seeker :: footer}"></div>
    <!-- Footer End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/user/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
        integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Template Javascript -->
    <script src="/user/js/main.js"></script>
</body>

</html>
