<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>All company</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="/user/img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/user/lib/animate/animate.min.css" rel="stylesheet">
    <link href="/user/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/user/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/user/css/style.css" rel="stylesheet">

</head>

<body>
    <div class="container-xxl bg-white p-0">
        <!-- Spinner Start -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->

        <!-- Navbar Start -->
        <div th:replace="~{layout/navbar-seeker :: navbar}"></div>
        <!-- Navbar End -->

        <!-- Header End -->
        <div class="container-xxl py-5 bg-dark page-header mb-5">
            <div class="container my-5 pt-5 pb-4">
                <h1 class="display-3 text-white mb-3 animated slideInDown">Tất cả công ty</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb text-uppercase">
                        <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                        <li class="breadcrumb-item text-white active" aria-current="page">Công ty IT</li>
                    </ol>
                </nav>
            </div>
        </div>
        <!-- Header End -->

        <!-- All company start -->
        <div class="container-fluid pt-4 px-4">
            <div class="container">
                <h2 class="text-center">Tất cả công ty</h2>
            </div>
            <div class="rounded h-100 p-4">
                <div class="row">
                    <div class="mb-1 col-md-4 " th:each="company : ${companies}">
                        <div class="company-card" th:attr="data-company-id=${company.id}">
                            <div class="container my-3">
                                <div class="card shadow-sm rounded-lg">
                                    <div class="card-body p-4">
                                        <div class="d-flex justify-content-center mb-3">
                                            <div class="image-container text-center">
                                                <img th:src="${company.logo}" alt="Company Logo"
                                                    class="img-fluid rounded-circle" style="max-width: 120px;" />
                                            </div>
                                        </div>

                                        <h5 class="card-title text-center job-title">
                                            <a th:href="@{/companies/{id}(id=${company.id})}"
                                                th:text="${company.name}"></a>
                                        </h5>

                                        <div class="d-flex flex-wrap justify-content-center gap-2 mt-3">
                                            <span th:each="skill : ${company.skills}"
                                                th:attr="data-skill-id=${skill.id}"
                                                class="badge skill-tag bg-light text-dark rounded-pill px-3 py-2"
                                                th:text="${skill.name}"></span>
                                        </div>
                                    </div>

                                    <div
                                        class="card-footer d-flex justify-content-between align-items-center p-3 bg-light rounded-bottom">
                                        <p class="mb-0 text-muted" th:text="${company.country}"
                                            style="font-size: 1rem;"></p>
                                        <a th:href="@{/companies/{id}(id=${company.id})}" class="text-primary"
                                            style="font-size: 1rem;">
                                            <span th:text="${company.jobs.size()}"></span> Việc làm
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <!-- All company end -->

        <!-- Pagination -->
        <nav aria-label="Pagination navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/companies(page=${currentPage-1})}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/companies(page=${i})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/companies(page=${currentPage+1})}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
        <!-- End Pagination -->

        <!-- Footer Start -->
        <div th:replace="~{layout/footer-seeker :: footer}"></div>
        <!-- Footer End -->


        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/user/lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="/user/js/main.js"></script>
</body>

</html>
