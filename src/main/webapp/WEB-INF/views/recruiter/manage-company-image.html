<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Recruiter-Manage Company's image</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <!-- Favicon -->
  <link href="img/favicon.ico" rel="icon">

  <!-- Google Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Font Stylesheet -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Libraries Stylesheet -->
  <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
  <link href="/manager/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

  <!-- Customized Bootstrap Stylesheet -->
  <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

  <!-- Template Stylesheet -->
  <link href="/manager/css/style.css" rel="stylesheet">

  <!-- Lightbox2 CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
  <!-- Toastr library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
    integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
  <div class="container-fluid position-relative bg-white d-flex p-0">
    <!-- Spinner Start -->
    <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
    <!-- Spinner End -->


    <!-- Sidebar Start -->
    <div th:replace="~{layout/sidebar-recruiter:: sidebar-recruiter}"></div>
    <!-- Sidebar End -->


    <!-- Content Start -->
    <div class="content">
      <!-- Navbar Start -->
      <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
      <!-- Navbar End -->


      <!-- Mở đầu phần chính -->
      <div class="container-fluid pt-4 px-4">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/recruiter/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Hình ảnh công ty</li>
          </ol>
        </nav>
        <div class="bg-light rounded h-100 p-4">
          <h6 class="mb-4">Hình ảnh công ty</h6>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th scope="col">Mã số</th>
                  <th scope="col">Hình ảnh</th>
                  <th scope="col">Mô tả</th>
                  <th scope="col">Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="image : ${companyImages}">
                  <td th:text="${image.id}"></td>
                  <td>

                    <img th:src="@{/company-images/{pic}(pic=${image.image})}" alt="Company"
                      style="width: 100px; height: 100px; object-fit: cover;" />

                  </td>

                  <td th:text="${image.description}"></td>
                  <td>
                    <div class="btn-group" role="group">
                      <a th:href="@{/company-images/{pic}(pic=${image.image})}" data-lightbox="company-gallery"
                        th:attr="data-title=${image.description}">
                        <button class="btn btn-sm btn-success me-2">
                          Xem ảnh
                        </button>
                      </a>
                      <button class="btn btn-sm btn-warning me-2" data-bs-toggle="modal"
                        data-bs-target="#editImageModal"
                        th:attr="data-id=${image.id}, data-description=${image.description}, data-image=${image.image}">
                        Chỉnh sửa
                      </button>
                      <a th:href="@{/recruiter/manage-company-image/delete-image/{id}(id=${image.id})}"
                        class="btn btn-sm btn-danger delete-link">Xóa</a>
                    </div>
                  </td>

                </tr>
              </tbody>
            </table>
            <!-- Pagination -->
            <nav>
              <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/recruiter/manage-company-image(page=${currentPage-1})}"
                    aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                  </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                  th:classappend="${currentPage == i} ? 'active'">
                  <a class="page-link" th:href="@{/recruiter/manage-company-image(page=${i})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                  <a class="page-link" th:href="@{/recruiter/manage-company-image(page=${currentPage+1})}"
                    aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                  </a>
                </li>
              </ul>
            </nav>

            <!-- Nút thêm mới hình ảnh -->
            <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addImageModal">Thêm hình
              ảnh</button>
          </div>
        </div>
      </div>
      <!-- Kết thúc phần chính -->


      <!-- modal thêm hình ảnh -->
      <div class="modal fade" id="addImageModal" tabindex="-1" aria-labelledby="addImageModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="addImageModalLabel">Thêm hình ảnh</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/recruiter/manage-company-image/add-image}" method="post" enctype="multipart/form-data">
              <div class="modal-body">
                <div class="mb-3 text-center">
                  <label class="form-label">Xem trước</label>
                  <div class="col-12">
                    <img id="imagePreview" src="" alt=""
                      style="max-height: 150px; max-width: 60%; cursor: pointer; border-radius: 30px; border: transparent solid;" />
                  </div>

                </div>
                <div class="mb-3">
                  <label for="imageFile" class="form-label">Hình ảnh</label>
                  <input type="file" class="form-control" id="imageFile" name="imageFile"
                    accept=".png, .jpg, .jpeg, .webp" required>
                </div>
                <div class="mb-3">
                  <label for="imageDescription" class="form-label">Mô tả</label>
                  <textarea class="form-control" id="imageDescription" name="description"
                    placeholder="Nhập mô tả"></textarea>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="submit" class="btn btn-primary">Thêm</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <!-- modal thêm hình ảnh-->

      <!-- Modal sửa hình ảnh -->
      <div class="modal fade" id="editImageModal" tabindex="-1" aria-labelledby="editImageModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="editImageModalLabel">Chỉnh sửa hình ảnh</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/recruiter/manage-company-image/update-image}" method="post"
              enctype="multipart/form-data">
              <div class="modal-body">
                <input type="hidden" id="editImageId" name="id">

                <!-- Hiển thị ảnh cũ -->
                <div class="mb-3 text-center">
                  <label class="form-label">Ảnh hiện tại</label>
                  <div class="col-12">
                    <img
                      style="max-height: 150px; max-width: 60%; cursor: pointer; border-radius: 30px; border:  transparent  solid;"
                      alt="avatar preview" id="editImagePreview"
                      th:src="@{/company-images/{avatar}(avatar=${session.avatar})}" />
                  </div>
                </div>

                <!-- Trường thay đổi ảnh -->

                <div class="mb-3">
                  <label for="editImageFile" class="form-label">Chọn ảnh mới</label>
                  <div class="mb-3 text-center">
                    <label class="form-label">Xem trước</label>
                    <div class="col-12">
                      <img id="editImageChoose"
                        style="max-height: 150px; max-width: 60%; cursor: pointer; border-radius: 30px; border: transparent solid;"
                        alt="" />
                    </div>
                  </div>

                  <input type="file" class="form-control" id="editImageFile" name="imageFile"
                    accept=".png, .jpg, .jpeg, .webp">
                </div>

                <!-- Trường mô tả -->
                <div class="mb-3">
                  <label for="editImageDescription" class="form-label">Mô tả</label>
                  <textarea class="form-control" id="editImageDescription" name="description"></textarea>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <!-- modal sửa hình ảnh-->

      <div th:replace="~{layout/confirm-delete-modal :: confirm-delete-modal}"></div>
      <!-- Footer Start -->
      <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
      <!-- Footer End -->
    </div>
    <!-- Content End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
  </div>

  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
    integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Template Javascript -->
  <script src="/manager/js/main.js"></script>
  <!-- Lightbox2 JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
  <script>
    const editModal = document.getElementById("editImageModal");
    editModal.addEventListener("show.bs.modal", function (event) {
      const button = event.relatedTarget; // Nút kích hoạt modal
      const id = button.getAttribute("data-id");
      const image = button.getAttribute("data-image");
      const description = button.getAttribute("data-description");

      // Điền dữ liệu vào các trường trong modal
      editModal.querySelector("#editImageId").value = id;
      editModal.querySelector("#editImageDescription").value = description;

      // Hiển thị ảnh cũ
      const imagePreview = editModal.querySelector("#editImagePreview");
      imagePreview.src = `/company-images/${image}`; // Đường dẫn ảnh
    });

    document
      .getElementById("imageFile")
      .addEventListener("change", function (event) {
        const file = event.target.files[0]; // Lấy file đã chọn
        if (file) {
          const reader = new FileReader(); // Tạo FileReader để đọc file ảnh
          reader.onload = function (e) {
            document.getElementById("addImagePreview").src = e.target.result; // Cập nhật ảnh xem trước
          };
          reader.readAsDataURL(file); // Đọc file ảnh dưới dạng URL
        }
      });
    document
      .getElementById("editImageFile")
      .addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            document.getElementById("editImageChoose").src = e.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
  </script>

</body>

</html>
