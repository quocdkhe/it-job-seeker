<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Recruiter-Follower</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <!-- Favicon -->
  <link href="img/favicon.ico" rel="icon">

  <!-- Google Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Font Stylesheet -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Libraries Stylesheet -->
  <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

  <!-- Customized Bootstrap Stylesheet -->
  <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

  <!-- Template Stylesheet -->
  <link href="/manager/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
    integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="container-fluid position-relative bg-white d-flex p-0">
    <!-- Spinner Start -->
    <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
    <!-- Spinner End -->


    <!-- Sidebar Start -->
    <div th:replace="~{layout/sidebar-recruiter :: sidebar-recruiter}"></div>
    <!-- Sidebar End -->


    <!-- Content Start -->
    <div class="content">
      <!-- Navbar Start -->
      <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
      <!-- Navbar End -->


      <!-- Mở đầu phần chính -->
      <div class="container-fluid pt-4 px-4">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/recruiter/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Người theo dõi</li>
          </ol>
        </nav>
        <div class="bg-light rounded h-100 p-4">
          <h6 class="mb-4">Danh sách người theo dõi</h6>
          <div colspan="6">
            <button class="btn btn-sm btn-success" onclick="openEmailAllModal()">
              <i class="fa fa-envelope me-2"></i>Gửi Email tất cả
            </button>

          </div>
          <div class="table-responsive">
            <select id="followerList" style="display: none;">
              <option value="" disabled selected>Đang tải danh sách người theo dõi...</option>
            </select>
            <table class="table">
              <thead>
                <tr>
                  <th scope="col">Mã số</th>
                  <th scope="col">Họ và tên</th>
                  <th scope="col">Email</th>
                  <th scope="col"></th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="follower : ${followers}">
                  <td th:text="${follower.id}"></td>
                  <td th:text="${follower.fullName}"></td>
                  <td th:text="${follower.email}"></td>
                  <td>
                    <button class="btn btn-sm btn-success" onclick="openEmailModal(this)"
                      th:if="${follower.email}!=null">
                      <i class="fa fa-envelope me-2"></i>Gửi Email
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <!-- Pagination -->
            <nav aria-label="Pagination navigation">
              <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/admin/account(page=${currentPage-1})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                  </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                  th:classappend="${currentPage == i} ? 'active'">
                  <a class="page-link" th:href="@{/admin/account(page=${i})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                  <a class="page-link" th:href="@{/admin/account(page=${currentPage+1})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                  </a>
                </li>
              </ul>
            </nav>
            <!-- End Pagination -->

          </div>
        </div>
      </div>
      <!-- Kết thúc phần chính -->

      <!-- Modal gửi email -->
      <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <form id="emailForm" th:action="@{/send-follower-email}" method="post">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Gửi Email</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <!-- Email người nhận -->
                <div class="mb-3">
                  <label for="recipientEmail" class="form-label">Đến</label>
                  <input type="email" class="form-control" id="recipientEmail" name="recipientEmail" readonly>
                </div>
                <!-- Tiêu đề email -->
                <div class="mb-3">
                  <label for="emailSubject" class="form-label">Tiêu đề</label>
                  <input type="text" class="form-control" id="emailSubject" name="emailSubject" required>
                </div>
                <!-- Đầu mục email -->
                <div class="mb-3">
                  <label for="emailHeader" class="form-label">Đầu mục</label>
                  <input type="text" class="form-control" id="emailHeader" name="emailHeader" required>
                </div>
                <!-- Nội dung email -->
                <div class="mb-3">
                  <label for="emailDescription" class="form-label">Nội dung</label>
                  <textarea class="form-control" id="emailDescription" name="emailDescription"></textarea>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-error" data-bs-dismiss="modal">Hủy</button>
                <button type="reset" class="btn btn-secondary">Đặt lại</button>
                <button type="submit" class="btn btn-primary">Gửi Email</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="modal fade" id="emailAllModal" tabindex="-1" aria-labelledby="emailAllModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <form id="emailAllForm" th:action="@{/send-follower-email-all}" method="post">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Gửi Email Cho Tất Cả</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <!-- Tiêu đề email -->
                <div class="mb-3">
                  <label for="emailSubjectAll" class="form-label">Tiêu đề</label>
                  <input type="text" class="form-control" id="emailSubjectAll" name="emailSubject" required>
                </div>
                <!-- Đầu mục email -->
                <div class="mb-3">
                  <label for="emailHeaderAll" class="form-label">Đầu mục</label>
                  <input type="text" class="form-control" id="emailHeaderAll" name="emailHeader" required>
                </div>
                <!-- Nội dung email -->
                <div class="mb-3">
                  <label for="emailDescriptionAll" class="form-label">Nội dung</label>
                  <textarea class="form-control" id="emailDescriptionAll" name="emailDescription"></textarea>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-error" data-bs-dismiss="modal">Hủy</button>
                <button type="reset" class="btn btn-secondary">Đặt lại</button>
                <button type="submit" class="btn btn-primary">Gửi Email</button>
              </div>
            </div>
          </form>
        </div>
      </div>


      <div th:if="${emailSent}" class="alert alert-success">
        Email đã được gửi thành công!
      </div>
      <div th:if="${emailSentAll}" class="alert alert-success">
        Email đã được gửi đến tất cả người theo dõi thành công!
      </div>




      <!-- Footer Start -->
      <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
      <!-- Footer End -->
    </div>
    <!-- Content End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
  </div>

  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
    integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Template Javascript -->
  <script src="/manager/js/main.js"></script>

</body>
<script>
  function openEmailModal(button) {
    var row = button.closest("tr");
    var email = row.querySelector("td:nth-child(3)").textContent.trim();

    document.getElementById("recipientEmail").value = email;

    var emailModal = new bootstrap.Modal(document.getElementById("emailModal"));
    emailModal.show();
  }

  function openEmailAllModal() {
    var emailAllModal = new bootstrap.Modal(document.getElementById("emailAllModal"));
    emailAllModal.show();
  }


</script>

</html>
