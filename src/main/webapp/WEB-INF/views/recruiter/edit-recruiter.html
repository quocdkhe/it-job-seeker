<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Edit profile for recruiter</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/manager/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <!-- Customized Bootstrap Stylesheet -->
    <link href="/manager/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/manager/css/style.css" rel="stylesheet">
    <!-- Toastr library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css"
        integrity="sha512-6S2HWzVFxruDlZxI3sXOZZ4/eJ8AcxkQH1+JjSe/ONCEqR9L4Ysq5JdT5ipqtzU7WHalNwzwBv+iE51gNHJNqQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container-fluid position-relative bg-white d-flex p-0">
        <!-- Spinner Start -->
        <div th:replace="~{layout/spinner-recruiter :: spinner-recruiter}"></div>
        <!-- Spinner End -->


        <!-- Sidebar Start -->
        <div th:replace="~{layout/sidebar-recruiter :: sidebar-recruiter}"></div>
        <!-- Sidebar End -->


        <!-- Content Start -->
        <div class="content">
            <!-- Navbar Start -->
            <div th:replace="~{layout/navbar-recruiter :: navbar-recruiter}"></div>
            <!-- Navbar End -->

            <!-- Mở đầu phần chính -->

            <!-- Form Start -->
            <div class="container-fluid pt-4 px-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/recruiter/dashboard">Dashboard</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Tài khoản của tôi</li>
                    </ol>
                </nav>
                <div class="bg-light rounded h-100 p-4">
                    <form th:action="@{/recruiter/edit-recruiter}" method="post" th:object="${user}"
                        enctype="multipart/form-data">
                        <div class="row g-4">
                            <!-- Input fullname, phone, email, address -->
                            <div class="col-sm-12 col-xl-8">
                                <div class="bg-light rounded h-100 p-4">
                                    <h6 class="mb-4">Thông tin cá nhân</h6>
                                    <input type="number" class="form-control" id="id" th:field="*{id}" hidden>
                                    <div class="mb-3">
                                        <label for="fullname" class="form-label">Họ và tên</label>
                                        <input type="text" class="form-control" id="fullname"
                                            placeholder="Nhập họ và tên" th:field="*{fullName}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="phonenumber" class="form-label">Số điện thoại</label>
                                        <input type="text" class="form-control" id="phonenumber"
                                            placeholder="Nhập số điện thoại" th:field="*{phone}" required>
                                        <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"
                                            style="color: red;">
                                        </div>

                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputEmail1" class="form-label">Email</label>
                                        <input type="text" class="form-control" id="exampleInputEmail1"
                                            placeholder="Nhập email" th:field="*{email}" required>
                                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                                            style="color: red;">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="address" class="form-label">Địa chỉ</label>
                                        <input type="text" class="form-control" id="address" placeholder="Nhập địa chỉ"
                                            th:field="*{address}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="dateofbirth" class="form-label">Ngày sinh</label>
                                        <input type="date" class="form-control" id="dateofbirth" th:field="*{birthDate}"
                                            required>
                                        <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"
                                            style="color: red;">
                                        </div>
                                    </div>
                                    <fieldset class="row mb-3">
                                        <legend class="col-form-label col-sm-2 pt-0">Giới tính</legend>
                                        <div class="col-sm-10">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="gender" id="male"
                                                    value="true" th:field="*{gender}">
                                                <label class="form-check-label" for="male">
                                                    Nam
                                                </label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="gender" id="female"
                                                    value="false" th:field="*{gender}">
                                                <label class="form-check-label" for="female">
                                                    Nữ
                                                </label>
                                            </div>
                                        </div>
                                    </fieldset>
                                </div>
                            </div>
                            <div class="col-sm-12 col-xl-4 text-center">
                                <div class="col-12">
                                    <input class="form-control" type="file" id="imageFile" name="imageFile"
                                        accept=".png, .jpg, .jpeg, .webp" style="display: none;" />
                                </div>

                                <!-- Hiển thị ảnh hiện tại (click để chọn file) -->
                                <div class="col-12">
                                    <img th:if="${session.provider == 'LOCAL'}"
                                        style="max-height: 250px; max-width: 100%; cursor: pointer; border-radius: 30px; border: transparent solid;"
                                        alt="Click để chọn ảnh đại diện" id="imagePreview"
                                        th:src="${session.avatar != null ? '/avatar/' + session.avatar : '/avatar/avatar-trang-4.jpg'}"
                                        onclick="document.getElementById('imageFile').click();" />

                                    <img th:if="${session.provider != 'LOCAL'}"
                                        style="max-height: 250px; max-width: 100%; cursor: pointer; border-radius: 30px; border: transparent solid;"
                                        alt="Click để chọn ảnh đại diện" id="imagePreview"
                                        th:src="${session.avatar != null ? session.avatar : '/avatar/avatar-trang-4.jpg'}" />

                                    <p th:if="${session.avatar == null}"
                                        style="margin-top: 10px; font-size: 14px; color: #555;">Click vào đây để chọn
                                        ảnh đại diện</p>
                                </div>
                            </div>
                            <div class="mb-3 d-flex justify-content-start">
                                <div>
                                    <button type="submit" class="btn btn-primary me-2">Cập nhật ngay</button>
                                    <button th:if="${session.provider == 'LOCAL'}" type="button"
                                        class="btn btn-success me-2" data-bs-toggle="modal"
                                        data-bs-target="#changePasswordModal">
                                        Đổi mật khẩu
                                    </button>
                                </div>
                            </div>



                    </form>
                </div>
            </div>`

            <!-- Footer Start -->
            <div th:replace="~{layout/footer-recruiter :: footer-recruiter}"></div>
            <!-- Footer End -->
        </div>

        <!-- Password Change Modal -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="changePasswordModalLabel">Đổi Mật Khẩu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="changePasswordForm" th:action="@{/recruiter/update-pwd}" th:object="${user}"
                            method="post">
                            <input type="number" class="form-control" id="id2" th:field="*{id}" hidden>

                            <div class="mb-3">
                                <label for="newPassword" class="form-label">Mật khẩu cũ</label>
                                <input type="password" name="oldPassword" class="form-control" id="oldPassword"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">Mật khẩu mới</label>
                                <input type="password" class="form-control" id="newPassword" th:field="*{password}"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" name="confirmPassword" class="form-control" id="confirmPassword"
                                    required>
                                <div id="confirmPasswordError" class="form-text text-danger"></div>
                                <!-- Hiển thị lỗi -->
                            </div>
                            <div class="d-flex justify-content-between">
                                <div>
                                    <button type="submit" class="btn btn-primary">Đổi Mật Khẩu</button>
                                    <a href="/forget-pass" class="btn btn-link">Quên Mật Khẩu</a>
                                </div>
                                <button type="reset" class="btn btn-secondary">Xóa hết</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>


    </div>
    <!-- Content End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"
        integrity="sha512-lbwH47l/tPXJYG9AcFNoJaTMhGvYWhVM9YI43CT+uteTRRaiLCui8snIgyAN8XWgNjNhCqlAUdzZptso6OCoFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Template Javascript -->
    <script src="/manager/js/main.js"></script>

</body>

</html>
